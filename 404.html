<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>404 — Ошибка FreedMC</title>
    <style>
        body {
            background-color: #050505;
            color: #00aaff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .error-code {
            font-size: 10rem;
            font-weight: bold;
            text-shadow: 5px 5px #ff0055, -5px -5px #00ff64;
            animation: glitch 1s infinite;
            margin: 0;
        }

        h2 {
            font-size: 1.5rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        p {
            color: #555;
            max-width: 400px;
        }

        .back-btn {
            margin-top: 30px;
            padding: 12px 25px;
            border: 2px solid #00aaff;
            color: #00aaff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 5px;
        }

        .back-btn:hover {
            background: #00aaff;
            color: black;
            box-shadow: 0 0 20px #00aaff;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <h1 class="error-code">404</h1>
    <h2>Чанки не прогрузились</h2>
    <p>Похоже, эта страница была взорвана крипером или просто никогда не существовала в нашем мире.</p>

    <a href="https://i.freedmc.v6.rocks" class="back-btn">ВЕРНУТЬСЯ НА СПАВН</a>

</body>
</html>
