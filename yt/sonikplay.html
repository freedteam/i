<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$onik Play — Official Station</title>
    <style>
        :root {
            --accent-color: #ff0055; /* Розовый неон */
            --bg-color: #080808;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Эффект шума на фоне */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
        }

        .main-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 85, 0.2);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.1);
            max-width: 400px;
            width: 90%;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 20px;
            box-shadow: 0 0 20px var(--accent-color);
            object-fit: cover;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: #111;
            border: 1px solid #222;
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--accent-color);
            color: black;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
        }

        .player-mini {
            margin-top: 30px;
            background: #000;
            padding: 10px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #333;
        }

        .play-icon {
            width: 30px;
            height: 30px;
            background: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <img src="sp.jpg" alt="$onik" class="avatar">
        
        <h1>$ONIK PLAY</h1>
        <p class="description">Listen to the latest phonk & underground releases</p>

        <div class="btn-list">
            <a href="#" class="btn">SPOTIFY</a>
            <a href="#" class="btn">VK MUSIC</a>
            <a href="#" class="btn">TELEGRAM CHANNEL</a>
            <a href="#" class="btn">SOUNDCLOUD</a>
        </div>

        <div class="player-mini">
            <div class="play-icon"></div>
            <marquee scrollamount="3" style="font-size: 0.8rem; color: #00ff64;">Now Playing: Timerik - School Ultrafunk (Remix)</marquee>
        </div>
    </div>

</body>
</html>
