<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreedMC — Лучшая Анархия</title>
    <style>
        :root {
            --accent: #00aaff;
            --bg: #0d0d0d;
            --card-bg: #161616;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            text-align: center;
        }

        header {
            padding: 100px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
        }

        .logo {
            width: 180px;
            filter: drop-shadow(0 0 15px var(--accent));
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent);
        }

        .online {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0, 255, 100, 0.1);
            border: 1px solid #00ff64;
            color: #00ff64;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .ip-box {
            margin-top: 40px;
            background: var(--card-bg);
            display: inline-flex;
            align-items: center;
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
        }

        .ip-box:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .ip-text {
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 15px;
        }

        .copy-btn {
            background: var(--accent);
            color: black;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 50px 10%;
            background: #0a0a0a;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }

        .feature-card:hover {
            border-bottom-color: var(--accent);
            background: #1f1f1f;
        }

        .feature-card h3 {
            color: var(--accent);
            margin-top: 0;
        }

        footer {
            padding: 40px;
            color: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg" alt="FreedMC" class="logo" onerror="this.style.display='none'">
        <h1>FreedMC</h1>
        <div class="online">Сервер в разработке</div>
        <br>
        <div class="ip-box" onclick="copyIp()">
            <span class="ip-text" id="serverIp">FreedMC.aternos.me</span>
            <span class="copy-btn">Копировать</span>
        </div>
    </header>

    <section class="features">
        <div class="feature-card">
            <h3>Анархия</h3>
            <p>Классическое выживание без правил. Гриферство и полная свобода действий.</p>
        </div>
        <div class="feature-card">
            <h3>Столбы</h3>
            <p>Тоже самое что мини игра снизу.</p>
        </div>
        <div class="feature-card">
            <h3>Столбы</h3>
            <p>Уникальная хорошая мини игра.</p>
        </div>
    </section>

    <footer>
        &copy; 2026 FreedMC Server. Не является официальным продуктом Mojang AB.
    </footer>

    <script>
        function copyIp() {
            const ip = document.getElementById('serverIp').innerText;
            navigator.clipboard.writeText(ip);
            alert('IP адрес скопирован: ' + ip);
        }
    </script>
</body>
</html>
